name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup project
        uses: ./.github/actions/setup

      - name: Run check
        run: pnpm check

      - name: Run build
        run: pnpm build

      - name: Run test
        run: pnpm test
